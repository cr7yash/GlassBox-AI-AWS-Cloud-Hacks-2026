AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GlassBox AI — Serverless Platform (Role 3)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        AWS_REGION_NAME: us-west-2
        TRACES_TABLE: !Ref TracesTable
        STADIUMS_TABLE: !Ref StadiumsTable
        WS_CONNECTIONS_TABLE: !Ref WsConnectionsTable
        BEDROCK_AGENT_ID: AJFMFVPX2D
        BEDROCK_AGENT_ALIAS_ID: P6KDX0BDII
        KNOWLEDGE_BASE_ID: 4VLZUJAC0T

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB Tables
  # -----------------------------------------------------------------------
  TracesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: glassbox-traces
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trace_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: trace_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: session-timestamp-index
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  StadiumsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: glassbox-stadiums
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stadium_id
          AttributeType: S
      KeySchema:
        - AttributeName: stadium_id
          KeyType: HASH

  WsConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: glassbox-ws-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: session-index
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------------------
  # HTTP API — Trace Ingestion
  # -----------------------------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
          - OPTIONS
        AllowHeaders:
          - '*'

  TraceIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glassbox-traceIngest
      Handler: trace_ingest.handler
      CodeUri: lambdas/trace_ingest/
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TracesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeAgent
                - bedrock:InvokeModel
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        PostTrace:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /trace
            Method: POST

  # -----------------------------------------------------------------------
  # WebSocket API — Live Push
  # -----------------------------------------------------------------------
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: glassbox-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations"

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glassbox-wsConnect
      Handler: ws_connect.handler
      CodeUri: lambdas/ws_connect/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glassbox-wsDisconnect
      Handler: ws_disconnect.handler
      CodeUri: lambdas/ws_disconnect/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  # -----------------------------------------------------------------------
  # DynamoDB Stream → Broadcaster
  # -----------------------------------------------------------------------
  TraceBroadcasterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glassbox-traceBroadcaster
      Handler: trace_broadcaster.handler
      CodeUri: lambdas/trace_broadcaster/
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WsConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TracesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 1

Outputs:
  HttpApiUrl:
    Description: HTTP API endpoint for trace ingestion
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  WebSocketUrl:
    Description: WebSocket URL for live trace streaming
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  TracesTableName:
    Value: !Ref TracesTable

  StadiumsTableName:
    Value: !Ref StadiumsTable
